{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white/10 border-t-4 border-b-4 border-r-4 border-l-4 rounded-xl border-black/60 p-8 my-10">
    <h2 class="text-2xl font-bold mb-2 text-center">Individual Donor</h2>
    <p class="text-center text-sm mb-4">Share your surplus food with the community</p>
    <form method="POST" class="space-y-4 ">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Email Address" class="w-full p-3 bg-white/60 border border-black/60 rounded-lg outline-none" required>
        <input type="password" name="password" placeholder="Password" class="w-full p-3 bg-white/60 border border-black/60 rounded-lg outline-none" required>
        <input type="text" name="phone" placeholder="Phone Number" class="w-full p-3 bg-white/60 border border-black/60 rounded-lg outline-none" required>
        <input type="text" name="aadhaar" placeholder="Aadhaar Number (12 Digits)" pattern="\d{12}" title="Please enter exactly 12 digits" class="w-full p-3 bg-white/60 border border-black/60 rounded-lg outline-none" required>
        <input type="text" name="pincode" placeholder="Pincode" class="w-full p-3 bg-white/60 border border-black/60 rounded-lg outline-none" required>
        <textarea name="address" placeholder="Full Home Address" class="w-full p-3bg-white/60 border border-black/60 rounded-lg outline-none" required></textarea>
        <button type="submit" class="border border-black/60 w-full bg-green-400 py-3 rounded-lg font-bold hover:bg-green-500 transition">Register as Donor</button>
    </form>
</div>
{% endblock %}
