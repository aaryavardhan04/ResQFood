<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResQFood</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Enable manual dark mode toggle for Tailwind CDN
        tailwind.config = {
            darkMode: 'class',
        }
        // Check local storage immediately to prevent white flash on load
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #F8FAFC;
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .dark body {
            background: #111827; /* Tailwind gray-900 */
        }
        .glass {
            background: rgba(105, 90, 90, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 3px solid rgba(8, 7, 7, 0.75);
            border-radius: 20px;
        }
        .dark .glass {
            background: rgba(31, 41, 55, 0.4);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .nav-glass {
            background:  rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(16, 13, 13, 0.2);
        }
        .dark .nav-glass {
            background: rgba(17, 24, 39, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .dark input, .dark textarea, .dark select {
            color: white !important;
        }
        .dark input::placeholder, .dark textarea::placeholder {
            color: rgba(255, 255, 255, 0.6) !important;
        }
    </style>
</head>
<body class="text-black/90 dark:text-gray-100">

    <nav class="nav-glass sticky top-0 z-50 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="{% url 'home' %}" class="text-2xl font-bold tracking-wider dark:text-white">ResQ<span class="text-green-400">Food</span></a>
            <div class="space-x-6">
                <a href="{% url 'home' %}" class="hover:text-green-600 dark:hover:text-green-400 dark:text-gray-300">Browse Food</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'dashboard' %}" class="hover:text-green-600 dark:hover:text-green-400 dark:text-gray-300">Dashboard</a>
                    <a href="{% url 'logout' %}" class="bg-red-500 px-4 py-2 rounded-lg hover:bg-red-600 transition">Logout</a>
                {% else %}
                    <a href="{% url 'register_select' %}" class="hover:text-green-400 dark:text-gray-300">Join Us</a>
                    <a href="{% url 'login' %}" class="bg-green-400 px-4 py-2 rounded-lg hover:bg-green-600 transition text-black">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-6">
        {% if messages %}
            {% for message in messages %}
                <div class="p-4 mb-4 rounded-lg bg-grey border border-black text-#green-300 text-center">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>

    <!-- Global Theme Toggle Button -->
    <button onclick="toggleTheme()" class="fixed bottom-10 left-10 bg-gray-800 dark:bg-gray-200 text-white dark:text-black p-4 rounded-full shadow-2xl z-50 transition transform hover:scale-110 flex items-center justify-center w-14 h-14">
        <span class="dark:hidden text-xl">🌙</span>
        <span class="hidden dark:inline text-xl">☀️</span>
    </button>

    <script>
        // Global Theme Toggling Script
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            if (document.documentElement.classList.contains('dark')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
        }
    </script>
</body>
</html>
