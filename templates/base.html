<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResQFood</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #F8FAFC;
            min-height: 100vh;
        }
        .glass {
            background: rgba(105, 90, 90, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 3px solid rgba(8, 7, 7, 0.75);
            border-radius: 20px;
        }
        .nav-glass {
            background:  rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(16, 13, 13, 0.2);
        }
    </style>
</head>
<body class="text-black/90">

    <nav class="nav-glass sticky top-0 z-50 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="{% url 'home' %}" class="text-2xl font-bold tracking-wider">ResQ<span class="text-green-400">Food</span></a>
            <div class="space-x-6">
                <a href="{% url 'home' %}" class="hover:text-green-600">Browse Food</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'dashboard' %}" class="hover:text-green-600">Dashboard</a>
                    <a href="{% url 'logout' %}" class="bg-red-500 px-4 py-2 rounded-lg hover:bg-red-600 transition">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}" class="hover:text-green-400">Login</a>
                    <a href="{% url 'register_select' %}" class="bg-green-400 px-4 py-2 rounded-lg hover:bg-green-600 transition">Join Us</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-6">
        {% if messages %}
            {% for message in messages %}
                <div class="p-4 mb-4 rounded-lg bg-black border border-black text-#green-300 text-center">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
